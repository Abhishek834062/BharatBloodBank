
spring.datasource.url=${dburl2}
spring.datasource.username=${userName2}
spring.datasource.password=${password2}
spring.datasource.driver-class-name=org.postgresql.Driver




# JPA / Hibernate - 'update' will auto-create/update tables from entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ==========================================
# JWT
# ==========================================
# Secret key - must be at least 256 bits (32 chars) for HS256

app.jwt.secret=${jwtSecret}
# 24 hours in milliseconds
app.jwt.expiration-ms=86400000
# 15 minutes for password reset token
app.jwt.reset-token-expiry-minutes=15

# ==========================================
# EMAIL (Gmail SMTP)
# Change to your actual Gmail + App Password
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_GMAIL@gmail.com
spring.mail.password=YOUR_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# App base URL for reset links
app.base-url=http://localhost:8080

# ==========================================
# SERVER
# ==========================================
server.port=8080
server.servlet.context-path=/api

# ==========================================
# ADMIN SEED (auto-created on startup)
# Change these before production!
# ==========================================
app.admin.email=${adminEmail}
app.admin.password=${adminPassword}
app.admin.name=Super Admin

# ==========================================
# BLOOD COMPONENT EXPIRY (days from donation)
# ==========================================
app.blood.expiry.rbc=42
app.blood.expiry.plasma=365
app.blood.expiry.platelets=5

# ==========================================
# DONOR ELIGIBILITY
# ==========================================
app.donor.eligibility.gap-days=90

# ==========================================
# LOGGING
# ==========================================
logging.level.com.bharatbloodbank=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n



